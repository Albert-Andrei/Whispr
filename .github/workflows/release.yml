name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build (Apple Silicon)
        run: bun run tauri build --target aarch64-apple-darwin

      - name: Build (Intel)
        run: bun run tauri build --target x86_64-apple-darwin

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          name: Whispr ${{ github.ref_name }}
          body: |
            ## Whispr ${{ github.ref_name }}

            Offline transcription for video and audio on macOS.

            Download the `.dmg` for your Mac (Apple Silicon or Intel) from the assets below.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
